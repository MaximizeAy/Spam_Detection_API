<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SpamLens — Intelligent Spam Detection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=DM+Sans:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
/* ═══════════════════════════════════════════════════════
   Design Tokens — Dark (default) & Light
   ═══════════════════════════════════════════════════════ */
:root {
  --font-ui: 'DM Sans', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --radius: 14px;
  --radius-sm: 8px;
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

[data-theme="dark"] {
  --bg: #0C0F14;
  --bg-elevated: #14181F;
  --bg-card: #1A1F28;
  --bg-input: #111620;
  --fg: #E8ECF4;
  --fg-secondary: #8B95A8;
  --fg-muted: #4A5568;
  --accent: #E8A03E;
  --accent-dim: rgba(232, 160, 62, 0.12);
  --accent-glow: rgba(232, 160, 62, 0.25);
  --danger: #F0465A;
  --danger-dim: rgba(240, 70, 90, 0.12);
  --danger-glow: rgba(240, 70, 90, 0.3);
  --safe: #2DD4A0;
  --safe-dim: rgba(45, 212, 160, 0.12);
  --safe-glow: rgba(45, 212, 160, 0.3);
  --border: rgba(255, 255, 255, 0.06);
  --border-focus: rgba(232, 160, 62, 0.4);
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --shadow-lg: 0 12px 48px rgba(0,0,0,0.5);
  --glass: rgba(20, 24, 31, 0.7);
}

[data-theme="light"] {
  --bg: #F4F1EC;
  --bg-elevated: #FFFFFF;
  --bg-card: #FFFFFF;
  --bg-input: #F8F6F2;
  --fg: #1A1D24;
  --fg-secondary: #5F6775;
  --fg-muted: #A0A7B4;
  --accent: #C47F1A;
  --accent-dim: rgba(196, 127, 26, 0.08);
  --accent-glow: rgba(196, 127, 26, 0.15);
  --danger: #D6304A;
  --danger-dim: rgba(214, 48, 74, 0.08);
  --danger-glow: rgba(214, 48, 74, 0.15);
  --safe: #1A9E76;
  --safe-dim: rgba(26, 158, 118, 0.08);
  --safe-glow: rgba(26, 158, 118, 0.15);
  --border: rgba(0, 0, 0, 0.07);
  --border-focus: rgba(196, 127, 26, 0.4);
  --shadow: 0 4px 24px rgba(0,0,0,0.06);
  --shadow-lg: 0 12px 48px rgba(0,0,0,0.1);
  --glass: rgba(255, 255, 255, 0.8);
}

/* ═══════════════════════════════════════════════════════
   Reset & Base
   ═══════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-ui);
  background: var(--bg);
  color: var(--fg);
  min-height: 100vh;
  transition: background var(--transition), color var(--transition);
  overflow-x: hidden;
  line-height: 1.6;
}

/* Subtle grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(var(--border) 1px, transparent 1px),
    linear-gradient(90deg, var(--border) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
  opacity: 0.5;
}

/* Ambient glow */
.ambient {
  position: fixed;
  width: 500px; height: 500px;
  border-radius: 50%;
  filter: blur(150px);
  pointer-events: none;
  z-index: 0;
  opacity: 0.4;
  transition: opacity var(--transition);
}
.ambient-1 { top: -200px; left: -100px; background: var(--accent); opacity: 0.08; }
.ambient-2 { bottom: -200px; right: -100px; background: var(--danger); opacity: 0.06; }

/* ═══════════════════════════════════════════════════════
   Layout
   ═══════════════════════════════════════════════════════ */
.app {
  position: relative;
  z-index: 1;
  max-width: 640px;
  margin: 0 auto;
  padding: 24px 20px 100px;
}

/* ═══════════════════════════════════════════════════════
   Header
   ═══════════════════════════════════════════════════════ */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 36px;
  padding-bottom: 20px;
  border-bottom: 1px solid var(--border);
}
.brand {
  display: flex;
  align-items: center;
  gap: 12px;
}
.brand-icon {
  width: 42px; height: 42px;
  background: linear-gradient(135deg, var(--accent), #D4622B);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 18px;
  box-shadow: 0 4px 16px var(--accent-glow);
}
.brand h1 {
  font-size: 22px;
  font-weight: 900;
  letter-spacing: -0.5px;
}
.brand span {
  font-size: 11px;
  font-weight: 400;
  color: var(--fg-secondary);
  display: block;
  margin-top: -2px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* Theme toggle */
.theme-toggle {
  width: 44px; height: 44px;
  border-radius: 12px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--fg-secondary);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
}
.theme-toggle:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-dim);
}

/* ═══════════════════════════════════════════════════════
   Input Section
   ═══════════════════════════════════════════════════════ */
.input-section {
  margin-bottom: 24px;
}
.textarea-wrap {
  position: relative;
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  background: var(--bg-input);
  transition: border-color var(--transition), box-shadow var(--transition);
  overflow: hidden;
}
.textarea-wrap:focus-within {
  border-color: var(--border-focus);
  box-shadow: 0 0 0 3px var(--accent-dim);
}
.textarea-wrap textarea {
  width: 100%;
  min-height: 160px;
  padding: 16px 18px;
  border: none;
  background: transparent;
  color: var(--fg);
  font-family: var(--font-ui);
  font-size: 14px;
  line-height: 1.7;
  resize: vertical;
  outline: none;
}
.textarea-wrap textarea::placeholder { color: var(--fg-muted); }
.char-count {
  position: absolute;
  bottom: 10px; right: 14px;
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--fg-muted);
  pointer-events: none;
}

/* Action buttons row */
.actions-row {
  display: flex;
  gap: 10px;
  margin-top: 14px;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 11px 20px;
  border-radius: var(--radius-sm);
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  border: 1.5px solid transparent;
  transition: all var(--transition);
  white-space: nowrap;
}
.btn:active { transform: scale(0.97); }
.btn-primary {
  background: linear-gradient(135deg, var(--accent), #D4622B);
  color: #fff;
  box-shadow: 0 4px 16px var(--accent-glow);
}
.btn-primary:hover {
  box-shadow: 0 6px 24px var(--accent-glow);
  filter: brightness(1.1);
}
.btn-primary:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  filter: none;
}
.btn-secondary {
  background: var(--bg-card);
  color: var(--fg-secondary);
  border-color: var(--border);
}
.btn-secondary:hover {
  border-color: var(--fg-muted);
  color: var(--fg);
  background: var(--bg-elevated);
}
.btn i { font-size: 13px; }

/* Hidden file input */
#fileInput { display: none; }

/* ═══════════════════════════════════════════════════════
   Loading Animation
   ═══════════════════════════════════════════════════════ */
.loader {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  padding: 48px 0;
}
.loader.active { display: flex; }

.scanner {
  width: 80px; height: 80px;
  position: relative;
}
.scanner-ring {
  position: absolute;
  inset: 0;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
.scanner-ring:nth-child(2) {
  inset: 8px;
  border-top-color: transparent;
  border-right-color: var(--danger);
  animation-duration: 1.4s;
  animation-direction: reverse;
}
.scanner-dot {
  position: absolute;
  top: 50%; left: 50%;
  width: 8px; height: 8px;
  margin: -4px 0 0 -4px;
  background: var(--accent);
  border-radius: 50%;
  animation: pulse-dot 1.2s ease-in-out infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes pulse-dot {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.8); opacity: 0.3; }
}
.loader-text {
  font-size: 13px;
  color: var(--fg-secondary);
  font-weight: 500;
}
.loader-text span {
  color: var(--accent);
  font-family: var(--font-mono);
}
.loader-bar {
  width: 200px; height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.loader-bar-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--accent), var(--danger));
  border-radius: 2px;
  animation: load-fill 1.8s ease-out forwards;
}
@keyframes load-fill {
  0% { width: 0%; }
  30% { width: 55%; }
  60% { width: 78%; }
  100% { width: 100%; }
}

/* ═══════════════════════════════════════════════════════
   Result Card
   ═══════════════════════════════════════════════════════ */
.results-area { display: none; }
.results-area.active { display: block; }

.result-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  overflow: hidden;
  animation: slide-up 0.5s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
  opacity: 0;
  transform: translateY(16px);
}
@keyframes slide-up {
  to { opacity: 1; transform: translateY(0); }
}

.result-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 20px 22px;
  border-bottom: 1px solid var(--border);
}
.result-badge {
  width: 48px; height: 48px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}
.result-badge.spam {
  background: var(--danger-dim);
  color: var(--danger);
  box-shadow: 0 0 20px var(--danger-glow);
}
.result-badge.safe {
  background: var(--safe-dim);
  color: var(--safe);
  box-shadow: 0 0 20px var(--safe-glow);
}
.result-badge.suspicious {
  background: var(--accent-dim);
  color: var(--accent);
  box-shadow: 0 0 20px var(--accent-glow);
}
.result-title { font-size: 18px; font-weight: 700; }
.result-subtitle { font-size: 12px; color: var(--fg-secondary); margin-top: 2px; }
.result-meta {
  margin-left: auto;
  text-align: right;
  flex-shrink: 0;
}
.response-time {
  font-size: 11px;
  font-family: var(--font-mono);
  color: var(--fg-muted);
  display: flex;
  align-items: center;
  gap: 4px;
  justify-content: flex-end;
}
.response-time i { font-size: 10px; }

/* ═══════════════════════════════════════════════════════
   Confidence Meter
   ═══════════════════════════════════════════════════════ */
.confidence-section {
  padding: 22px;
  border-bottom: 1px solid var(--border);
}
.confidence-label {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 12px;
}
.confidence-label span:first-child {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--fg-secondary);
}
.confidence-value {
  font-family: var(--font-mono);
  font-size: 28px;
  font-weight: 600;
}
.confidence-value.spam-color { color: var(--danger); }
.confidence-value.safe-color { color: var(--safe); }
.confidence-value.suspicious-color { color: var(--accent); }

.meter-track {
  width: 100%;
  height: 10px;
  background: var(--bg-input);
  border-radius: 5px;
  overflow: hidden;
  position: relative;
}
.meter-fill {
  height: 100%;
  border-radius: 5px;
  width: 0%;
  transition: width 1s cubic-bezier(0.22, 0.61, 0.36, 1);
  position: relative;
}
.meter-fill.spam-fill {
  background: linear-gradient(90deg, var(--accent), var(--danger));
  box-shadow: 0 0 12px var(--danger-glow);
}
.meter-fill.safe-fill {
  background: linear-gradient(90deg, var(--safe), #5EEAC4);
  box-shadow: 0 0 12px var(--safe-glow);
}
.meter-fill.suspicious-fill {
  background: linear-gradient(90deg, #F0C46A, var(--accent));
  box-shadow: 0 0 12px var(--accent-glow);
}
/* Shimmer on meter */
.meter-fill::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  animation: shimmer 2s ease-in-out infinite;
}
@keyframes shimmer {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

/* ═══════════════════════════════════════════════════════
   Feature Breakdown
   ═══════════════════════════════════════════════════════ */
.features-section {
  padding: 22px;
}
.features-title {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--fg-secondary);
  margin-bottom: 16px;
}
.feature-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}
.feature-item:last-child { border-bottom: none; }
.feature-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  flex-shrink: 0;
}
.feature-icon.flagged {
  background: var(--danger-dim);
  color: var(--danger);
}
.feature-icon.clear {
  background: var(--safe-dim);
  color: var(--safe);
}
.feature-icon.warn {
  background: var(--accent-dim);
  color: var(--accent);
}
.feature-info { flex: 1; min-width: 0; }
.feature-name {
  font-size: 13px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
}
.feature-name .tag {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 2px 6px;
  border-radius: 4px;
}
.tag.high { background: var(--danger-dim); color: var(--danger); }
.tag.medium { background: var(--accent-dim); color: var(--accent); }
.tag.low { background: var(--safe-dim); color: var(--safe); }
.tag.none { background: rgba(255,255,255,0.05); color: var(--fg-muted); }
.feature-desc {
  font-size: 11px;
  color: var(--fg-secondary);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.feature-bar-wrap {
  width: 80px;
  flex-shrink: 0;
}
.feature-bar-track {
  height: 4px;
  background: var(--bg-input);
  border-radius: 2px;
  overflow: hidden;
}
.feature-bar-fill {
  height: 100%;
  border-radius: 2px;
  width: 0%;
  transition: width 0.8s cubic-bezier(0.22, 0.61, 0.36, 1);
}
.feature-bar-fill.high { background: var(--danger); }
.feature-bar-fill.medium { background: var(--accent); }
.feature-bar-fill.low { background: var(--safe); }
.feature-bar-fill.none { background: var(--fg-muted); }

/* ═══════════════════════════════════════════════════════
   Batch Results
   ═══════════════════════════════════════════════════════ */
.batch-summary {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
}
.batch-stat {
  flex: 1;
  padding: 14px;
  border-radius: var(--radius-sm);
  background: var(--bg-input);
  border: 1px solid var(--border);
  text-align: center;
}
.batch-stat-num {
  font-family: var(--font-mono);
  font-size: 24px;
  font-weight: 600;
}
.batch-stat-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--fg-secondary);
  margin-top: 2px;
}

.batch-item {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 12px;
  animation: slide-up 0.4s ease forwards;
  opacity: 0;
  transition: border-color var(--transition);
}
.batch-item:hover { border-color: var(--fg-muted); }
.batch-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.batch-dot.spam { background: var(--danger); box-shadow: 0 0 8px var(--danger-glow); }
.batch-dot.safe { background: var(--safe); box-shadow: 0 0 8px var(--safe-glow); }
.batch-dot.suspicious { background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }
.batch-text {
  flex: 1;
  font-size: 13px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.batch-conf {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 600;
  flex-shrink: 0;
}

/* ═══════════════════════════════════════════════════════
   Sample chips
   ═══════════════════════════════════════════════════════ */
.samples {
  margin-top: 20px;
  padding-top: 18px;
  border-top: 1px solid var(--border);
}
.samples-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--fg-muted);
  margin-bottom: 10px;
}
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  padding: 6px 14px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 500;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--fg-secondary);
  cursor: pointer;
  transition: all var(--transition);
}
.chip:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-dim);
}

/* ═══════════════════════════════════════════════════════
   Toast
   ═══════════════════════════════════════════════════════ */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--fg);
  font-size: 13px;
  font-weight: 500;
  padding: 10px 20px;
  border-radius: 12px;
  box-shadow: var(--shadow-lg);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: transform 0.4s cubic-bezier(0.22, 0.61, 0.36, 1), opacity 0.4s ease;
  display: flex;
  align-items: center;
  gap: 8px;
}
.toast.show {
  transform: translateX(-50%) translateY(0);
  opacity: 1;
}

/* ═══════════════════════════════════════════════════════
   Footer stats
   ═══════════════════════════════════════════════════════ */
.footer-stats {
  margin-top: 40px;
  display: flex;
  justify-content: center;
  gap: 32px;
  padding: 18px 0;
  border-top: 1px solid var(--border);
}
.stat-item { text-align: center; }
.stat-num {
  font-family: var(--font-mono);
  font-size: 20px;
  font-weight: 600;
  color: var(--fg);
}
.stat-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: var(--fg-muted);
  margin-top: 2px;
}

/* ═══════════════════════════════════════════════════════
   Responsive
   ═══════════════════════════════════════════════════════ */
@media (max-width: 480px) {
  .app { padding: 16px 14px 80px; }
  .brand h1 { font-size: 18px; }
  .actions-row { flex-direction: column; }
  .btn { justify-content: center; }
  .result-header { flex-wrap: wrap; }
  .result-meta { margin-left: 0; width: 100%; text-align: left; margin-top: 8px; }
  .feature-bar-wrap { width: 60px; }
  .batch-summary { flex-wrap: wrap; }
  .batch-stat { min-width: calc(50% - 5px); }
  .footer-stats { gap: 20px; }
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>
<body>


<script>
/* ═══════════════════════════════════════════════════════
   SpamLens — Client-side Spam Detection Engine
   Rule-based heuristic analysis with weighted scoring
   ═══════════════════════════════════════════════════════ */

// ── Sample emails for quick testing ──
const SAMPLES = [
  {
    label: 'Nigerian Prince',

  },
  {
    label: 'Pharmacy Ad',
    text: 'GET 80% OFF on all medications!!! Viagra, Cialis, Xanax — no prescription needed! Order now at www.cheap-pills.biz. Limited time offer! FREE SHIPPING! Call 1-900-555-0199 now!!!'
  },
  {

  },
  {

    text: 'URGENT: Your Bitcoin wallet has been selected for our EXCLUSIVE doubling program! Send 0.5 BTC to 1A1zP1eP5QGefi2DMPTfTL5SLmv7DivfNa and receive 1.0 BTC back in 24 hours GUARANTEED!!! Act now before slots fill up!'
  },
  {

  }

// ── Spam detection rules ──
const RULES = [
  {
    id: 'urgency_words',
    name: 'Urgency Triggers',
    desc: 'Words designed to create false urgency',
    icon: 'fa-solid fa-bolt',
    patterns: [/urgent/i, /act now/i, /immediate/i, /hurry/i, /limited time/i, /don't miss/i, /before it/i, /asap/i, /respond now/i],
    weight: 12,
    type: 'flag'
  },
  {
    id: 'excessive_caps',
    name: 'Excessive Caps Lock',
    desc: 'Overuse of uppercase for attention',
    icon: 'fa-solid fa-font',
    check: (t) => { const caps = (t.match(/[A-Z]{3,}/g) || []).length; return { score: Math.min(caps * 6, 30), detail: `${caps} all-caps segments` }; },
    weight: 6,
    type: 'flag'
  },
  {
    id: 'money_mentions',
    name: 'Money / Financial Bait',
    desc: 'Unsolicited money-related promises',
    icon: 'fa-solid fa-dollar-sign',
    patterns: [/\$\d[\d,]*\d/, /million/i, /inheritance/i, /transfer.*account/i, /free money/i, /earn.*\$/i, /profit/i, /investment.*guarantee/i],
    weight: 14,
    type: 'flag'
  },
  {
    id: 'suspicious_urls',
    name: 'Suspicious URLs',
    desc: 'Untrustworthy or obfuscated links',
    icon: 'fa-solid fa-link',
    check: (t) => {
      const urls = t.match(/https?:\/\/[^\s]+/g) || [];
      let suspicious = 0;
      const susWords = ['free','cheap','deal','offer','claim','win','bonus','click','xyz','.biz','.tk','.top'];
      urls.forEach(u => { if (susWords.some(w => u.toLowerCase().includes(w))) suspicious++; });
      if (urls.length > 3) suspicious += 2;
      return { score: suspicious * 10, detail: `${suspicious}/${urls.length} URLs flagged` };
    },
    weight: 15,
    type: 'flag'
  },
  {
    id: 'excessive_punctuation',
    name: 'Excessive Punctuation',
    desc: 'Multiple exclamation marks or question marks',
    icon: 'fa-solid fa-exclamation',
    check: (t) => {
      const excl = (t.match(/!{2,}/g) || []).length;
      const ques = (t.match(/\?{2,}/g) || []).length;
      return { score: (excl + ques) * 5, detail: `${excl} exclamation bursts, ${ques} question bursts` };
    },
    weight: 5,
    type: 'flag'
  },
  {
    id: 'pharma_keywords',
    name: 'Pharmaceutical Keywords',
    desc: 'Drug names or pharmacy-related spam',
    icon: 'fa-solid fa-pills',
    patterns: [/viagra/i, /cialis/i, /xanax/i, /valium/i, /no prescription/i, /medication/i, /pharmacy/i, /diet pill/i, /weight loss.*guarantee/i],
    weight: 18,
    type: 'flag'
  },
  {
    id: 'click_bait',
    name: 'Click-Bait Phrases',
    desc: 'Manipulative phrases to drive clicks',
    icon: 'fa-solid fa-arrow-pointer',
    patterns: [/click here/i, /click now/i, /sign up now/i, /subscribe now/i, /open now/i, /verify.*account/i, /confirm.*details/i, /update.*information/i],
    weight: 10,
    type: 'flag'
  },
  {
    id: 'greeting_quality',
    name: 'Greeting Quality',
    desc: 'Generic or impersonal salutations',
    icon: 'fa-solid fa-hand',
    check: (t) => {
      const bad = ['dear friend', 'dear beloved', 'dear customer', 'dear user', 'dear member', 'attention:', 'hello dear'];
      const found = bad.filter(g => t.toLowerCase().includes(g));
      const hasPersonal = /\b(hi|hey|hello)\s+[A-Z][a-z]+\b/.test(t);
      return { score: found.length * 8, detail: found.length ? `"${found[0]}" detected` : (hasPersonal ? 'Personalized greeting' : 'No greeting detected') };
    },
    weight: 8,
    type: 'warn'
  },
  {
    id: 'sender_impersonation',
    name: 'Impersonation Signals',
    desc: 'Claims of authority or fake identity',
    icon: 'fa-solid fa-user-secret',
    patterns: [/prince/i, /king/i, /minister/i, /ceo.*need/i, /bank.*manager/i, /fbi/i, /irs/i, /government/i, /official.*notice/i, /account.*suspended/i],
    weight: 16,
    type: 'flag'
  },
  {
    id: 'personalization',
    name: 'Contextual Relevance',
    desc: 'Evidence of genuine, specific context',
    icon: 'fa-solid fa-message',
    check: (t) => {
      const signals = [
        /\b(yesterday|tomorrow|last week|next week)\b/i,
        /\b(meeting|call|lunch|coffee|standup)\b/i,
        /\b(attachment|attached|document|file)\b/i,
        /\b(please review|please check|could you|would you)\b/i,
        /\b(project|task|deadline|milestone)\b/i,
      ];
      const hits = signals.filter(s => s.test(t)).length;
      return { score: -hits * 6, detail: `${hits} contextual signals found` };
    },
    weight: 6,
    type: 'clear'
  },
  {
    id: 'structure_quality',
    name: 'Writing Structure',
    desc: 'Sentence variety and paragraph formatting',
    icon: 'fa-solid fa-paragraph',
    check: (t) => {
      const sentences = t.split(/[.!?]+/).filter(s => s.trim().length > 10);
      const avgLen = sentences.length ? sentences.reduce((a, s) => a + s.trim().split(/\s+/).length, 0) / sentences.length : 0;
      const paragraphs = t.split(/\n\n+/).filter(p => p.trim().length > 20).length;
      let score = 0;
      if (avgLen > 5 && avgLen < 25) score -= 5;
      if (paragraphs >= 2) score -= 4;
      if (sentences.length >= 3) score -= 3;
      return { score, detail: `${sentences.length} sentences, avg ${Math.round(avgLen)} words, ${paragraphs} paragraphs` };
    },
    weight: 4,
    type: 'clear'
  }
];

// ── Analysis engine ──
function analyzeEmail(text) {
  if (!text.trim()) return null;

  const features = [];
  let totalScore = 0;

  RULES.forEach(rule => {
    let result;

    if (rule.check) {
      result = rule.check(text);
    } else if (rule.patterns) {
      const matches = rule.patterns.filter(p => p.test(text));
      result = {
        score: matches.length * rule.weight,
        detail: matches.length ? `${matches.length} pattern(s) matched` : 'No matches'
      };
    }

    // Clamp individual feature contribution
    const clampedScore = Math.max(-20, Math.min(35, result.score));
    totalScore += clampedScore;

    const rawPct = Math.abs(clampedScore) / 35 * 100;
    let severity;
    if (clampedScore <= 0) severity = 'none';
    else if (rawPct < 30) severity = 'low';
    else if (rawPct < 65) severity = 'medium';
    else severity = 'high';

    features.push({
      id: rule.id,
      name: rule.name,
      desc: result.detail,
      icon: rule.icon,
      score: clampedScore,
      severity,
      type: rule.type
    });
  });

  // Normalize to 0–100 confidence
  // Raw score range roughly -40 to +120, map to 0-100
  const confidence = Math.round(Math.max(0, Math.min(100, (totalScore + 40) / 160 * 100)));

  let classification;
  if (confidence >= 70) classification = 'spam';
  else if (confidence >= 40) classification = 'suspicious';
  else classification = 'safe';

  return { confidence, classification, features, text: text.trim() };
}

// ── DOM References ──
const emailInput = document.getElementById('emailInput');
const charCount = document.getElementById('charCount');
const predictBtn = document.getElementById('predictBtn');
const uploadBtn = document.getElementById('uploadBtn');
const clearBtn = document.getElementById('clearBtn');
const fileInput = document.getElementById('fileInput');
const loader = document.getElementById('loader');
const loaderPhase = document.getElementById('loaderPhase');
const resultsArea = document.getElementById('resultsArea');
const themeToggle = document.getElementById('themeToggle');
const toastEl = document.getElementById('toast');
const sampleChipsEl = document.getElementById('sampleChips');

// ── State ──
let stats = { total: 0, spam: 0, safe: 0, times: [] };
let isAnalyzing = false;

// ── Character count ──
emailInput.addEventListener('input', () => {
  const len = emailInput.value.length;
  charCount.textContent = `${len.toLocaleString()} chars`;
});

// ── Theme toggle ──
themeToggle.addEventListener('click', () => {
  const html = document.documentElement;
  const current = html.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  themeToggle.querySelector('i').className = next === 'dark' ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
});

// ── Toast ──
let toastTimer = null;
function showToast(msg, icon = 'fa-solid fa-circle-info') {
  toastEl.innerHTML = `<i class="${icon}" style="color:var(--accent)"></i> ${msg}`;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2200);
}

// ── Sample chips ──
SAMPLES.forEach((s, i) => {
  const chip = document.createElement('button');
  chip.className = 'chip';
  chip.textContent = s.label;
  chip.addEventListener('click', () => {
    emailInput.value = s.text;
    emailInput.dispatchEvent(new Event('input'));
    emailInput.focus();
  });
  sampleChipsEl.appendChild(chip);
});

// ── Loading phases ──
const PHASES = ['tokenizing', 'scanning patterns', 'evaluating features', 'computing confidence', 'finalizing'];

function showLoader() {
  loader.classList.add('active');
  resultsArea.classList.remove('active');
  resultsArea.innerHTML = '';
  // Reset bar animation
  const bar = loader.querySelector('.loader-bar-fill');
  bar.style.animation = 'none';
  void bar.offsetWidth;
  bar.style.animation = 'load-fill 1.8s ease-out forwards';

  let phaseIdx = 0;
  loaderPhase.textContent = PHASES[0];
  const phaseInterval = setInterval(() => {
    phaseIdx++;
    if (phaseIdx < PHASES.length) {
      loaderPhase.textContent = PHASES[phaseIdx];
    } else {
      clearInterval(phaseInterval);
    }
  }, 360);
  return phaseInterval;
}

function hideLoader(phaseInterval) {
  clearInterval(phaseInterval);
  loader.classList.remove('active');
}

// ── Render single result ──
function renderResult(result, responseTime) {
  const { confidence, classification, features } = result;

  const classLabels = { spam: 'Spam Detected', suspicious: 'Suspicious', safe: 'Likely Safe' };
  const classDescs = {
    spam: 'This email exhibits strong spam characteristics',
    suspicious: 'Some indicators warrant caution',
    safe: 'No significant spam signals detected'
  };
  const classIcons = {
    spam: 'fa-solid fa-triangle-exclamation',
    suspicious: 'fa-solid fa-circle-exclamation',
    safe: 'fa-solid fa-circle-check'
  };
  const meterClass = { spam: 'spam-fill', suspicious: 'suspicious-fill', safe: 'safe-fill' };
  const valueClass = { spam: 'spam-color', suspicious: 'suspicious-color', safe: 'safe-color' };

  const featureHTML = features.map(f => {
    const iconClass = f.type === 'flag' ? 'flagged' : (f.type === 'clear' ? 'clear' : 'warn');
    const barPct = Math.min(100, Math.abs(f.score) / 35 * 100);
    return `
      <div class="feature-item">
        <div class="feature-icon ${iconClass}"><i class="${f.icon}"></i></div>
        <div class="feature-info">
          <div class="feature-name">${f.name} <span class="tag ${f.severity}">${f.severity}</span></div>
          <div class="feature-desc" title="${f.desc}">${f.desc}</div>
        </div>
        <div class="feature-bar-wrap">
          <div class="feature-bar-track">
            <div class="feature-bar-fill ${f.severity}" data-width="${barPct}"></div>
          </div>
        </div>
      </div>`;
  }).join('');

  const card = document.createElement('div');
  card.className = 'result-card';
  card.innerHTML = `
    <div class="result-header">
      <div class="result-badge ${classification}"><i class="${classIcons[classification]}"></i></div>
      <div>
        <div class="result-title">${classLabels[classification]}</div>
        <div class="result-subtitle">${classDescs[classification]}</div>
      </div>
      <div class="result-meta">
        <div class="response-time"><i class="fa-solid fa-stopwatch"></i> ${responseTime}ms</div>
      </div>
    </div>
    <div class="confidence-section">
      <div class="confidence-label">
        <span>Spam Confidence</span>
        <span class="confidence-value ${valueClass[classification]}" data-target="${confidence}">0%</span>
      </div>
      <div class="meter-track">
        <div class="meter-fill ${meterClass[classification]}" data-width="${confidence}"></div>
      </div>
    </div>
    <div class="features-section">
      <div class="features-title">Feature Breakdown</div>
      ${featureHTML}
    </div>`;

  resultsArea.appendChild(card);
  resultsArea.classList.add('active');

  // Animate meter and counter after paint
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      card.querySelector('.meter-fill').style.width = confidence + '%';
      animateCounter(card.querySelector('.confidence-value'), confidence);
      card.querySelectorAll('.feature-bar-fill').forEach(bar => {
        bar.style.width = bar.dataset.width + '%';
      });
    });
  });
}

// ── Animate counter ──
function animateCounter(el, target) {
  const start = performance.now();
  const duration = 900;
  function tick(now) {
    const t = Math.min(1, (now - start) / duration);
    const eased = 1 - Math.pow(1 - t, 3);
    el.textContent = Math.round(eased * target) + '%';
    if (t < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

// ── Update footer stats ──
function updateStats() {
  document.getElementById('totalAnalyzed').textContent = stats.total;
  document.getElementById('totalSpam').textContent = stats.spam;
  document.getElementById('totalSafe').textContent = stats.safe;
  const avg = stats.times.length ? Math.round(stats.times.reduce((a, b) => a + b, 0) / stats.times.length) : 0;
  document.getElementById('avgTime').textContent = avg + 'ms';
}

// ── Predict (single) ──
predictBtn.addEventListener('click', () => {
  const text = emailInput.value.trim();
  if (!text) {
    showToast('Please enter an email to analyze', 'fa-solid fa-keyboard');
    emailInput.focus();
    return;
  }
  if (isAnalyzing) return;
  isAnalyzing = true;
  predictBtn.disabled = true;

  const phaseInterval = showLoader();
  const startTime = performance.now();

  // Simulate processing delay for realistic feel
  const delay = 1600 + Math.random() * 600;
  setTimeout(() => {
    const responseTime = Math.round(performance.now() - startTime);
    hideLoader(phaseInterval);

    const result = analyzeEmail(text);
    if (result) {
      renderResult(result, responseTime);
      stats.total++;
      if (result.classification === 'spam') stats.spam++;
      else stats.safe++;
      stats.times.push(responseTime);
      updateStats();
    }

    isAnalyzing = false;
    predictBtn.disabled = false;
  }, delay);
});

// ── Clear ──
clearBtn.addEventListener('click', () => {
  emailInput.value = '';
  emailInput.dispatchEvent(new Event('input'));
  resultsArea.classList.remove('active');
  resultsArea.innerHTML = '';
  showToast('Cleared', 'fa-solid fa-eraser');
});

// ── Batch upload ──
uploadBtn.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', async (e) => {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  if (isAnalyzing) return;
  isAnalyzing = true;
  predictBtn.disabled = true;

  const phaseInterval = showLoader();
  const startTime = performance.now();

  // Read all files
  const texts = [];
  for (const file of files) {
    try {
      const content = await file.text();
      // Split by double newline or '---' for multi-email files
      const parts = content.split(/\n{2,}|---+/).map(s => s.trim()).filter(s => s.length > 20);
      texts.push(...parts);
    } catch { /* skip unreadable */ }
  }

  if (!texts.length) {
    hideLoader(phaseInterval);
    isAnalyzing = false;
    predictBtn.disabled = false;
    showToast('No valid text found in files', 'fa-solid fa-file-circle-xmark');
    fileInput.value = '';
    return;
  }

  const delay = 1800 + texts.length * 200;
  setTimeout(() => {
    const responseTime = Math.round(performance.now() - startTime);
    hideLoader(phaseInterval);

    // Analyze all
    const results = texts.map(t => analyzeEmail(t)).filter(Boolean);

    // Batch summary
    const spamCount = results.filter(r => r.classification === 'spam').length;
    const safeCount = results.filter(r => r.classification === 'safe').length;
    const susCount = results.filter(r => r.classification === 'suspicious').length;

    resultsArea.innerHTML = '';

    // Summary card
    const summary = document.createElement('div');
    summary.className = 'result-card';
    summary.innerHTML = `
      <div class="result-header" style="border-bottom:1px solid var(--border)">
        <div class="result-badge" style="background:var(--accent-dim);color:var(--accent);box-shadow:0 0 20px var(--accent-glow)">
          <i class="fa-solid fa-layer-group"></i>
        </div>
        <div>
          <div class="result-title">Batch Results</div>
          <div class="result-subtitle">${results.length} emails from ${files.length} file(s)</div>
        </div>
        <div class="result-meta">
          <div class="response-time"><i class="fa-solid fa-stopwatch"></i> ${responseTime}ms</div>
        </div>
      </div>
      <div style="padding:20px 22px">
        <div class="batch-summary">
          <div class="batch-stat">
            <div class="batch-stat-num" style="color:var(--danger)">${spamCount}</div>
            <div class="batch-stat-label">Spam</div>
          </div>
          <div class="batch-stat">
            <div class="batch-stat-num" style="color:var(--accent)">${susCount}</div>
            <div class="batch-stat-label">Suspicious</div>
          </div>
          <div class="batch-stat">
            <div class="batch-stat-num" style="color:var(--safe)">${safeCount}</div>
            <div class="batch-stat-label">Safe</div>
          </div>
        </div>
      </div>`;
    resultsArea.appendChild(summary);

    // Individual items
    const listWrap = document.createElement('div');
    listWrap.style.marginTop = '12px';

    results.forEach((r, i) => {
      const item = document.createElement('div');
      item.className = 'batch-item';
      item.style.animationDelay = (i * 80) + 'ms';
      const confColor = r.classification === 'spam' ? 'var(--danger)' : (r.classification === 'safe' ? 'var(--safe)' : 'var(--accent)');
      item.innerHTML = `
        <div class="batch-dot ${r.classification}"></div>
        <div class="batch-text" title="${r.text.replace(/"/g, '&quot;')}">${r.text.substring(0, 120)}${r.text.length > 120 ? '...' : ''}</div>
        <div class="batch-conf" style="color:${confColor}">${r.confidence}%</div>`;
      listWrap.appendChild(item);
    });

    resultsArea.appendChild(listWrap);
    resultsArea.classList.add('active');

    stats.total += results.length;
    stats.spam += spamCount;
    stats.safe += safeCount + susCount;
    stats.times.push(responseTime);
    updateStats();

    showToast(`Analyzed ${results.length} emails`, 'fa-solid fa-check-double');
    isAnalyzing = false;
    predictBtn.disabled = false;
    fileInput.value = '';
  }, delay);
});

// ── Keyboard: Enter to analyze ──
emailInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    predictBtn.click();
  }
});
</script>
